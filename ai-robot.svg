<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1e1e2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6ec7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff6ec7" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="screenClip">
      <rect x="220" y="210" width="160" height="60" rx="6"/>
    </clipPath>
  </defs>

  <!-- ambient glow behind robot -->
  <circle cx="300" cy="220" r="180" fill="url(#glow)">
    <animate attributeName="r" values="170;200;170" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- decorative code symbols -->
  <text x="60" y="200" font-family="monospace" font-size="22" fill="#8b5cf6" opacity="0.45">{ }</text>
  <text x="510" y="220" font-family="monospace" font-size="22" fill="#06b6d4" opacity="0.45">&lt;/&gt;</text>
  <text x="80" y="360" font-family="monospace" font-size="16" fill="#ff6ec7" opacity="0.45">[ai]</text>
  <text x="500" y="370" font-family="monospace" font-size="16" fill="#22c55e" opacity="0.45">$_</text>

  <!-- WHOLE ROBOT — floats up and down -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-10; 0,0" dur="3.2s" repeatCount="indefinite"/>

    <!-- antenna pole -->
    <line x1="300" y1="60" x2="300" y2="25" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round"/>

    <!-- antenna ball — pulsing color shift -->
    <circle cx="300" cy="20" r="6" fill="#ff6ec7">
      <animate attributeName="r" values="5;9;5" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="#ff6ec7;#06b6d4;#ff6ec7" dur="3s" repeatCount="indefinite"/>
    </circle>

    <!-- expanding signal waves — two layers -->
    <circle cx="300" cy="20" r="6" fill="none" stroke="#ff6ec7" stroke-width="2" opacity="0.8">
      <animate attributeName="r" values="6;28;6" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0;0.9" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="20" r="6" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.8">
      <animate attributeName="r" values="6;28;6" dur="2s" begin="0.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0;0.9" dur="2s" begin="0.7s" repeatCount="indefinite"/>
    </circle>

    <!-- HEAD -->
    <rect x="220" y="60" width="160" height="120" rx="20" fill="url(#bodyGrad)" stroke="#ffffff" stroke-width="2"/>

    <!-- left eye socket -->
    <circle cx="260" cy="115" r="14" fill="#0a0a1a"/>
    <!-- left pupil — blinks every 4s -->
    <circle cx="263" cy="112" r="6" fill="#06b6d4">
      <animate attributeName="r" values="6;6;6;1;6" keyTimes="0;0.85;0.92;0.96;1" dur="4s" repeatCount="indefinite"/>
    </circle>

    <!-- right eye socket -->
    <circle cx="340" cy="115" r="14" fill="#0a0a1a"/>
    <!-- right pupil — blinks every 4s -->
    <circle cx="343" cy="112" r="6" fill="#06b6d4">
      <animate attributeName="r" values="6;6;6;1;6" keyTimes="0;0.85;0.92;0.96;1" dur="4s" repeatCount="indefinite"/>
    </circle>

    <!-- speaker grille / mouth -->
    <rect x="280" y="148" width="40" height="10" rx="4" fill="#0a0a1a"/>
    <!-- speaker bars — dance like it's talking -->
    <rect x="286" y="151" width="2" height="4" fill="#06b6d4">
      <animate attributeName="opacity" values="1;0.2;1" dur="0.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="293" y="151" width="2" height="4" fill="#06b6d4">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="300" y="151" width="2" height="4" fill="#06b6d4">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="0.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="307" y="151" width="2" height="4" fill="#06b6d4">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="0.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="314" y="151" width="2" height="4" fill="#06b6d4">
      <animate attributeName="opacity" values="1;0.4;1" dur="0.5s" repeatCount="indefinite"/>
    </rect>

    <!-- neck -->
    <rect x="285" y="180" width="30" height="15" fill="#8b5cf6" stroke="#ffffff" stroke-width="1"/>

    <!-- BODY -->
    <rect x="200" y="195" width="200" height="155" rx="15" fill="url(#bodyGrad)" stroke="#ffffff" stroke-width="2"/>

    <!-- chest screen -->
    <rect x="220" y="210" width="160" height="60" rx="6" fill="url(#screenGrad)"/>
    <rect x="220" y="210" width="160" height="60" rx="6" fill="none" stroke="#06b6d4" stroke-width="1"/>

    <!-- scanning line in screen -->
    <line x1="222" y1="215" x2="378" y2="215" stroke="#06b6d4" stroke-width="1" opacity="0.6">
      <animate attributeName="y1" values="215;265;215" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="215;265;215" dur="3s" repeatCount="indefinite"/>
    </line>

    <!-- scrolling text inside screen -->
    <g clip-path="url(#screenClip)">
      <text font-family="monospace" font-size="13" fill="#06b6d4" font-weight="bold" y="240">
        <animate attributeName="x" values="380;-700" dur="14s" repeatCount="indefinite"/>
        AI-Native Dev • TypeScript • Next.js • Plus Ultra • Code is the sword of the modern age
      </text>
      <text font-family="monospace" font-size="11" fill="#22c55e" opacity="0.85" y="258">
        <animate attributeName="x" values="380;-450" dur="14s" repeatCount="indefinite"/>
        $ deploy --target=production --status=ok
      </text>
    </g>

    <!-- status LEDs -->
    <circle cx="240" cy="295" r="6" fill="#22c55e">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="265" cy="295" r="6" fill="#f7df1e">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="290" cy="295" r="6" fill="#ff6ec7">
      <animate attributeName="opacity" values="1;0.5;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <text x="310" y="300" font-family="monospace" font-size="11" fill="#ffffff" opacity="0.9">SYSTEM: OK</text>

    <!-- power button -->
    <circle cx="240" cy="325" r="11" fill="#0a0a1a" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="240" y="330" font-family="monospace" font-size="14" fill="#06b6d4" text-anchor="middle">⏻</text>
    <text x="265" y="330" font-family="monospace" font-size="11" fill="#ffffff" opacity="0.7">v3.0.1</text>

    <!-- LEFT arm — static -->
    <rect x="160" y="205" width="35" height="80" rx="10" fill="url(#bodyGrad)" stroke="#ffffff" stroke-width="2"/>
    <circle cx="177" cy="295" r="14" fill="url(#bodyGrad)" stroke="#ffffff" stroke-width="2"/>

    <!-- RIGHT arm — waving -->
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0 422 215; -28 422 215; 0 422 215; -28 422 215; 0 422 215" dur="2.5s" repeatCount="indefinite"/>
      <rect x="405" y="205" width="35" height="80" rx="10" fill="url(#bodyGrad)" stroke="#ffffff" stroke-width="2"/>
      <circle cx="423" cy="295" r="14" fill="url(#bodyGrad)" stroke="#ffffff" stroke-width="2"/>
      <text x="423" y="300" font-family="sans-serif" font-size="16" text-anchor="middle">👋</text>
    </g>
  </g>

  <!-- floating particles -->
  <circle cx="80" cy="100" r="2.5" fill="#ff6ec7">
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="120;80;120" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="520" cy="80" r="2.5" fill="#06b6d4">
    <animate attributeName="opacity" values="0;1;0" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="100;60;100" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="280" r="2.5" fill="#8b5cf6">
    <animate attributeName="opacity" values="0;1;0" dur="3.5s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="300;260;300" dur="3.5s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="540" cy="320" r="2.5" fill="#f7df1e">
    <animate attributeName="opacity" values="0;1;0" dur="4s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="340;300;340" dur="4s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="60" r="2" fill="#22c55e">
    <animate attributeName="opacity" values="0;1;0" dur="2.8s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="80;40;80" dur="2.8s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="480" cy="350" r="2" fill="#ff6ec7">
    <animate attributeName="opacity" values="0;1;0" dur="3.2s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="370;330;370" dur="3.2s" begin="2s" repeatCount="indefinite"/>
  </circle>
</svg>
